<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContextFlow</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Modern Header with Logo -->
    <header class="popup-header">
      <div class="header-content">
        <div class="logo-section">
          <div class="logo-icon">
            <img src="icons/icon128.png" alt="ContextFlow" width="36" height="36" style="border-radius: 8px;">
          </div>
          <div class="logo-text">
            <h1>ContextFlow</h1>
            <span class="tagline">AI Context Manager</span>
          </div>
        </div>
        <div class="header-actions">
          <button id="new-capsule-btn" class="icon-btn primary" title="Capture Capsule">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button id="tree-btn" class="icon-btn" title="Memory Tree">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="20" x2="12" y2="10"/>
              <line x1="18" y1="20" x2="18" y2="4"/>
              <line x1="6" y1="20" x2="6" y2="16"/>
            </svg>
          </button>
          <button id="export-btn" class="icon-btn" title="Export Memories">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
    
    <!-- Stats Cards -->
    <div class="stats-section">
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="total-capsules">0</span>
          <span class="stat-label">Memories</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect><rect x="9" y="9" width="6" height="6"></rect><line x1="9" y1="1" x2="9" y2="4"></line><line x1="15" y1="1" x2="15" y2="4"></line><line x1="9" y1="20" x2="9" y2="23"></line><line x1="15" y1="20" x2="15" y2="23"></line><line x1="20" y1="9" x2="23" y2="9"></line><line x1="20" y1="14" x2="23" y2="14"></line><line x1="1" y1="9" x2="4" y2="9"></line><line x1="1" y1="14" x2="4" y2="14"></line></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="total-usage">0</span>
          <span class="stat-label">Context Words</span>
        </div>
      </div>
    </div>
    
    <!-- Tabs Navigation -->
    <div class="popup-tabs">
      <button id="tab-memories-btn" class="tab-btn active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        </svg>
        <span>Memories</span>
      </button>
      <button id="tab-clipboard-btn" class="tab-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
        </svg>
        <span>Clipboard</span>
      </button>
    </div>

    <!-- Memories Tab Content -->
    <div id="memories-tab-content" class="tab-content">
      <!-- Search Bar -->
      <div class="search-section">
        <div class="search-input-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search capsules by title, content, or tags..." />
        </div>
      </div>
      
      <!-- Filters -->
      <div class="filters-section">
        <select id="folder-filter" class="filter-select">
          <option value="">All Folders</option>
          <option value="Uncategorized">Uncategorized</option>
          <option value="Engineering">Engineering</option>
          <option value="Marketing">Marketing</option>
          <option value="Product">Product</option>
          <option value="Research">Research</option>
        </select>
        
        <button id="favorites-filter" class="filter-chip">
          <svg class="chip-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          <span>Favorites</span>
        </button>
      </div>
      
      <!-- Capsules List -->
      <div id="capsules-list" class="capsules-list">
        <!-- Capsules will be dynamically loaded here -->
      </div>
    </div>

    <!-- Clipboard Tab Content -->
    <div id="clipboard-tab-content" class="tab-content hidden">
      <!-- Search and Actions Bar -->
      <div class="clipboard-controls">
        <div class="search-input-wrapper" style="flex: 1;">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="text" id="clipboard-search-input" placeholder="Search clipboard snippets..." />
        </div>
        <button id="clear-clipboard-btn" class="icon-btn danger-hover" title="Clear History">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
          </svg>
        </button>
      </div>
      
      <div id="clipboard-list" class="capsules-list">
        <!-- Clipboard items loaded dynamically -->
      </div>
    </div>
    

  </div>
  
  <!-- Settings Modal (AI OS Config) -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>AI OS Configuration</h2>
        <button id="close-settings-btn" class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p class="settings-desc">Manually select your active AI subscriptions to unlock accurate Pro token tracking and limits.</p>
        
        <div class="settings-group">
          <label class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-title">ChatGPT Plus</span>
              <span class="toggle-subtitle">Unlocks 128k context limit</span>
            </div>
            <div class="toggle-switch">
              <input type="checkbox" id="setting-chatgpt-pro">
              <span class="slider"></span>
            </div>
          </label>
          
          <label class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-title">Claude Pro</span>
              <span class="toggle-subtitle">Unlocks 200k context limit</span>
            </div>
            <div class="toggle-switch">
              <input type="checkbox" id="setting-claude-pro">
              <span class="slider"></span>
            </div>
          </label>
          
          <label class="toggle-row">
            <div class="toggle-info">
              <span class="toggle-title">Gemini Advanced</span>
              <span class="toggle-subtitle">Unlocks 1M context limit</span>
            </div>
            <div class="toggle-switch">
              <input type="checkbox" id="setting-gemini-pro">
              <span class="slider"></span>
            </div>
          </label>
        </div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
