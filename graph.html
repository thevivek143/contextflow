<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph - ContextFlow</title>
  <link rel="stylesheet" href="graph.css">
</head>
<body>
  <div class="graph-container">
    <header class="graph-header">
      <div style="display: flex; align-items: center; gap: 10px;">
        <img src="icons/icon128.png" alt="ContextFlow" width="28" height="28" style="border-radius: 6px;">
        <h1>Knowledge Graph</h1>
      </div>
      <div class="graph-controls">
        <button id="back-btn" title="Back to Explorer" style="margin-right: 8px; width: auto; padding: 0 12px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px;">📂 Explorer</button>
        <button id="zoom-in-btn" title="Zoom In">🔍+</button>
        <button id="zoom-out-btn" title="Zoom Out">🔍-</button>
        <button id="reset-btn" title="Reset View">🔄</button>
        <button id="filter-btn" title="Filter">🎯</button>
        <button id="close-btn" title="Close">✕</button>
      </div>
    </header>
    
    <div class="graph-sidebar">
      <div class="sidebar-section">
        <h3>Graph Stats</h3>
        <div class="stat-item">
          <span class="stat-label">Total Capsules:</span>
          <span class="stat-value" id="total-nodes">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Connections:</span>
          <span class="stat-value" id="total-edges">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Clusters:</span>
          <span class="stat-value" id="total-clusters">0</span>
        </div>
      </div>
      
      <div class="sidebar-section">
        <h3>Filters</h3>
        <label>
          <input type="checkbox" id="filter-favorites" checked>
          Show Favorites
        </label>
        <label>
          <input type="checkbox" id="filter-recent" checked>
          Recent (30 days)
        </label>
        <label>
          <input type="checkbox" id="filter-unused" checked>
          Unused Capsules
        </label>
        
        <h4>By Folder</h4>
        <div id="folder-filters"></div>
        
        <h4>By Platform</h4>
        <div id="platform-filters"></div>
      </div>
      
      <div class="sidebar-section">
        <h3>Selected Node</h3>
        <div id="node-details">
          <p class="empty-state">Click a node to see details</p>
        </div>
      </div>
    </div>
    
    <div class="graph-canvas-container">
      <canvas id="graph-canvas"></canvas>
      <div class="graph-legend">
        <div class="legend-item">
          <span class="legend-color" style="background: #667eea;"></span>
          <span>Favorite</span>
        </div>
        <div class="legend-item">
          <span class="legend-color" style="background: #10b981;"></span>
          <span>Frequently Used</span>
        </div>
        <div class="legend-item">
          <span class="legend-color" style="background: #f59e0b;"></span>
          <span>Rarely Used</span>
        </div>
        <div class="legend-item">
          <span class="legend-color" style="background: #6b7280;"></span>
          <span>Unused</span>
        </div>
      </div>
    </div>
  </div>
  
  <script src="graph.js"></script>
</body>
</html>
